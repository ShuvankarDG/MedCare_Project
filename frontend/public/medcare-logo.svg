<svg xmlns="http://www.w3.org/2000/svg" width="280" height="60" viewBox="0 0 280 60">
  <!-- Dark pill background -->
  <rect x="0" y="0" width="280" height="60" rx="14" fill="#1e1b4b"/>

  <!-- Indigo circle icon -->
  <circle cx="38" cy="30" r="22" fill="#4f46e5"/>

  <!-- Cross -->
  <rect x="30" y="18" width="14" height="24" rx="3" fill="white"/>
  <rect x="24" y="24" width="26" height="12" rx="3" fill="white"/>

  <!-- Heartbeat line -->
  <polyline points="24,46 29,46 33,40 38,52 43,42 47,46 52,46" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- MedCare text -->
  <text x="70" y="35" font-family="Arial, sans-serif" font-size="22" font-weight="600" fill="white">MedCare</text>

  <!-- Tagline -->
  <text x="71" y="50" font-family="Arial, sans-serif" font-size="7.5" font-weight="400" letter-spacing="2" fill="white" opacity="0.65">HEALTH CARE PLATFORM</text>

  <!-- Accent dot -->
  <circle cx="268" cy="30" r="4" fill="#818cf8"/>
</svg>
